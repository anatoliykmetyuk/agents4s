name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install sbt
        run: |
          curl -fsSL "https://github.com/sbt/sbt/releases/download/v1.12.9/sbt-1.12.9.tgz" | tar xz -C "$HOME"
          echo "$HOME/sbt/bin" >> "$GITHUB_PATH"
      - name: Format check
        run: sbt scalafmtCheckAll
      - name: Test with coverage (unit only)
        run: sbt clean coverage "testOnly cursordriver.TuiOpsTest cursordriver.CursorAgentUnitTest" coverageReport
      - name: Upload scoverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: scoverage-report
          path: target/scala-*/scoverage-report
